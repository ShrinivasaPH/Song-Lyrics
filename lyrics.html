<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎵 Song Lyrics — March 29</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #fffbf5;
    --bg2:       #fff7ec;
    --saffron:   #f4620f;
    --saffron-l: #ff8c3a;
    --rose:      #e8185a;
    --rose-l:    #ff4d80;
    --teal:      #0ea5a0;
    --yellow:    #f7c31e;
    --yellow-l:  #ffe168;
    --ink:       #1e0d00;
    --ink2:      #5a2e00;
    --muted:     #9b6f4a;
    --card-bg:   #ffffff;
    --border:    rgba(244,98,15,0.18);
    --border-s:  rgba(244,98,15,0.4);
    --shadow:    0 4px 24px rgba(244,98,15,0.10);
    --shadow-h:  0 8px 36px rgba(244,98,15,0.18);
    --sidebar-w: 290px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
  }

  /* Sparkle canvas */
  #sparkle-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0; opacity: 0.5;
  }

  /* ══ SIDEBAR ══ */
  .sidebar {
    width: var(--sidebar-w);
    height: 100vh;              /* important */
    background: linear-gradient(175deg, #fff8ee 0%, #fff2e0 100%);
    border-right: 2px solid var(--border);
    position: fixed;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: column;
    z-index: 100;
    box-shadow: 4px 0 24px rgba(244,98,15,0.07);
  }

  .sidebar-header {
    padding: 28px 24px 22px;
    background: linear-gradient(135deg, var(--saffron), var(--rose));
    position: relative; overflow: hidden;
  }
  .sidebar-header::before {
    content: '✦'; position: absolute; right: 16px; top: 12px;
    font-size: 42px; color: rgba(255,255,255,0.18);
    animation: spin 8s linear infinite;
  }
  .sidebar-header::after {
    content: '✦'; position: absolute; left: 8px; bottom: 8px;
    font-size: 22px; color: rgba(255,255,255,0.13);
    animation: spin 14s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sidebar-header .label {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: rgba(255,255,255,0.75); margin-bottom: 6px;
  }
  .sidebar-header h1 {
    font-family: 'Fraunces', serif; font-size: 26px; font-weight: 900;
    color: #fff; line-height: 1.15; text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .sidebar-header .count {
    display: inline-block; margin-top: 10px;
    font-size: 11px; font-weight: 700; color: #fff;
    background: rgba(255,255,255,0.22); border-radius: 20px; padding: 3px 12px;
  }

  .sidebar-search { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-search input {
    width: 100%; background: #fff; border: 1.5px solid var(--border);
    border-radius: 8px; padding: 9px 14px; color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 500;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .sidebar-search input::placeholder { color: var(--muted); }
  .sidebar-search input:focus {
    border-color: var(--saffron);
    box-shadow: 0 0 0 3px rgba(244,98,15,0.12);
  }

  .song-nav {
    flex: 1;
    overflow-y: auto;   /* move scrolling here */
    min-height: 0;      /* VERY important for flex scroll */
    padding: 8px 0 24px;
    list-style: none;
  }
  .song-nav li a {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 18px; text-decoration: none;
    border-left: 3px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    border-radius: 0 8px 8px 0; margin-right: 8px;
  }
  .song-nav li a:hover { background: rgba(244,98,15,0.07); border-left-color: var(--saffron-l); }
  .song-nav li a.active {
    background: linear-gradient(90deg, rgba(244,98,15,0.12), rgba(244,98,15,0.03));
    border-left-color: var(--saffron);
  }
  .song-nav .num {
    font-size: 10px; font-weight: 800; color: var(--saffron);
    min-width: 22px; background: rgba(244,98,15,0.1);
    border-radius: 4px; padding: 1px 5px; text-align: center; margin-top: 3px;
  }
  .song-nav .nav-title { font-size: 13px; font-weight: 700; color: var(--ink); line-height: 1.3; }
  .song-nav .nav-film { font-size: 10px; font-weight: 600; color: var(--rose); margin-top: 2px; }

  .no-results { padding: 16px 20px; font-size: 12px; color: var(--muted); display: none; }

  /* ══ MAIN ══ */
  .main { margin-left: var(--sidebar-w); flex: 1; padding-bottom: 80px; position: relative; z-index: 1; }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #fff3e0 0%, #fce4ec 50%, #e0f7f6 100%);
    border-bottom: 2px solid var(--border);
    padding: 56px 56px 48px; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute;
    width: 340px; height: 340px; border-radius: 50%;
    background: radial-gradient(circle, rgba(247,195,30,0.22), transparent 70%);
    right: -60px; top: -80px; pointer-events: none;
  }
  .hero::after {
    content: ''; position: absolute;
    width: 210px; height: 210px; border-radius: 50%;
    background: radial-gradient(circle, rgba(232,24,90,0.13), transparent 70%);
    right: 160px; bottom: -60px; pointer-events: none;
  }

  .hero .eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 800; letter-spacing: 3px;
    text-transform: uppercase; color: var(--saffron);
    background: rgba(244,98,15,0.08); border: 1px solid rgba(244,98,15,0.2);
    border-radius: 20px; padding: 4px 14px; margin-bottom: 18px;
  }
  .hero h2 {
    font-family: 'Fraunces', serif; font-size: 52px; font-weight: 900;
    color: var(--ink); line-height: 1.05; margin-bottom: 14px;
  }
  .hero h2 span {
    background: linear-gradient(90deg, var(--saffron), var(--rose));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hero p { font-size: 15px; color: var(--ink2); max-width: 460px; line-height: 1.7; }

  .hero .meta { display: flex; gap: 20px; margin-top: 28px; flex-wrap: wrap; }
  .meta-pill {
    display: flex; flex-direction: column; align-items: center;
    background: #fff; border: 1.5px solid var(--border); border-radius: 14px;
    padding: 12px 22px; box-shadow: 0 2px 12px rgba(244,98,15,0.08); min-width: 90px;
  }
  .meta-pill .v {
    font-family: 'Fraunces', serif; font-size: 30px; font-weight: 900;
    background: linear-gradient(135deg, var(--saffron), var(--rose));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;
  }
  .meta-pill .k {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); margin-top: 4px;
  }

  /* Songs container */
  .songs-container { padding: 40px 56px; display: flex; flex-direction: column; gap: 32px; }

  /* ── Song Card ── */
  .song-card {
    background: var(--card-bg); border: 1.5px solid var(--border);
    border-radius: 16px; overflow: hidden; box-shadow: var(--shadow);
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  }
  .song-card:hover {
    border-color: var(--border-s); box-shadow: var(--shadow-h); transform: translateY(-2px);
  }

  .card-accent { height: 5px; width: 100%; }
  .song-card:nth-child(5n+1) .card-accent { background: linear-gradient(90deg, var(--saffron), var(--yellow)); }
  .song-card:nth-child(5n+2) .card-accent { background: linear-gradient(90deg, var(--rose), #ff7eb3); }
  .song-card:nth-child(5n+3) .card-accent { background: linear-gradient(90deg, var(--teal), #5ee7e3); }
  .song-card:nth-child(5n+4) .card-accent { background: linear-gradient(90deg, var(--yellow), var(--saffron-l)); }
  .song-card:nth-child(5n+5) .card-accent { background: linear-gradient(90deg, #9b59b6, var(--rose)); }

  .song-card-header {
    padding: 20px 24px 18px; border-bottom: 1px solid rgba(244,98,15,0.1);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
    background: linear-gradient(180deg, #fffaf4, #fff);
  }
  .song-card-header-left { display: flex; align-items: flex-start; gap: 14px; }
  .song-number {
    font-size: 12px; font-weight: 800; color: #fff;
    background: linear-gradient(135deg, var(--saffron), var(--rose));
    border-radius: 8px; padding: 4px 10px; min-width: 40px; text-align: center;
    flex-shrink: 0; margin-top: 3px; box-shadow: 0 2px 8px rgba(244,98,15,0.3);
  }
  .song-title-block .film-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--rose); margin-bottom: 3px;
  }
  .song-title-block h2 {
    font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700;
    color: var(--ink); line-height: 1.25;
  }
  .edited-badge {
    display: none; align-items: center; gap: 4px; margin-top: 6px;
    font-size: 10px; font-weight: 700; color: var(--teal);
    background: rgba(14,165,160,0.1); border: 1px solid rgba(14,165,160,0.25);
    border-radius: 20px; padding: 2px 10px;
  }
  .edited-badge.visible { display: inline-flex; }

  .song-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: flex-start; margin-top: 2px; }
  .btn {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; font-weight: 700;
    border-radius: 8px; padding: 7px 16px; cursor: pointer; border: 1.5px solid;
    transition: all 0.18s; letter-spacing: 0.3px; white-space: nowrap;
  }
  .btn-edit { background: #fff; border-color: var(--border-s); color: var(--saffron); }
  .btn-edit:hover { background: rgba(244,98,15,0.06); border-color: var(--saffron); box-shadow: 0 2px 12px rgba(244,98,15,0.15); }
  .btn-save {
    background: linear-gradient(135deg, var(--saffron), var(--rose));
    border-color: transparent; color: #fff; box-shadow: 0 2px 10px rgba(244,98,15,0.35);
  }
  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(244,98,15,0.45); }
  .btn-cancel { background: #fff; border-color: #ddd; color: var(--muted); }
  .btn-cancel:hover { border-color: var(--muted); color: var(--ink); }
  .btn-reset { background: #fff; border-color: rgba(232,24,90,0.25); color: var(--rose); font-size: 11px; padding: 7px 12px; }
  .btn-reset:hover { background: rgba(232,24,90,0.06); border-color: var(--rose); }

  .btn-save, .btn-cancel, .btn-reset { display: none; }

  /* Lyrics */
  .song-lyrics {
    padding: 24px 28px 28px; font-size: 15px; line-height: 2;
    color: var(--ink2); white-space: pre-wrap; font-weight: 400;
  }
  .song-lyrics .note {
    display: inline-block; background: rgba(247,195,30,0.18);
    border: 1px solid rgba(247,195,30,0.5); border-radius: 6px;
    padding: 3px 10px; font-size: 12px; font-weight: 700; color: #8a6000;
  }
  .song-lyrics .translation {
    font-size: 12.5px; font-weight: 500; color: var(--teal); font-style: italic; opacity: 0.85;
  }
  .song-lyrics .marker {
    font-size: 11px; font-weight: 800; letter-spacing: 2px;
    text-transform: uppercase; color: var(--rose); opacity: 0.8;
  }
  .song-lyrics .divider {
    border: none; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(244,98,15,0.3), transparent);
    margin: 14px 0;
  }

  .song-edit-area {
    display: none; width: 100%; min-height: 300px; background: #fffaf4;
    border: none; border-top: 1.5px dashed rgba(244,98,15,0.25);
    color: var(--ink2); font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px; line-height: 2; padding: 24px 28px; outline: none; resize: vertical;
  }
  .song-edit-area:focus { background: #fffcf8; }

  .song-card.editing .song-lyrics    { display: none; }
  .song-card.editing .song-edit-area { display: block; }
  .song-card.editing .btn-edit       { display: none; }
  .song-card.editing .btn-save,
  .song-card.editing .btn-cancel,
  .song-card.editing .btn-reset      { display: inline-flex !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(244,98,15,0.25); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(244,98,15,0.45); }

  /* Animations */
  .song-card {
    opacity: 0; transform: translateY(20px);
    animation: riseIn 0.45s cubic-bezier(.22,.68,0,1.2) forwards;
  }
  @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }
  .song-card:nth-child(1)  { animation-delay: 0.05s; }
  .song-card:nth-child(2)  { animation-delay: 0.09s; }
  .song-card:nth-child(3)  { animation-delay: 0.13s; }
  .song-card:nth-child(4)  { animation-delay: 0.17s; }
  .song-card:nth-child(5)  { animation-delay: 0.21s; }
  .song-card:nth-child(6)  { animation-delay: 0.25s; }
  .song-card:nth-child(7)  { animation-delay: 0.29s; }
  .song-card:nth-child(8)  { animation-delay: 0.33s; }
  .song-card:nth-child(9)  { animation-delay: 0.37s; }
  .song-card:nth-child(10) { animation-delay: 0.41s; }
  .song-card:nth-child(11) { animation-delay: 0.45s; }
  .song-card:nth-child(12) { animation-delay: 0.49s; }
  .song-card:nth-child(13) { animation-delay: 0.53s; }
  .song-card:nth-child(14) { animation-delay: 0.57s; }
  .song-card:nth-child(15) { animation-delay: 0.61s; }

  /* Responsive */
  @media (max-width: 900px) {
    :root { --sidebar-w: 250px; }
    .hero, .songs-container { padding-left: 28px; padding-right: 28px; }
    .hero h2 { font-size: 38px; }
  }
  @media (max-width: 680px) {
    .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .hero, .songs-container { padding-left: 18px; padding-right: 18px; }
    .hero h2 { font-size: 30px; }
    .toggle-sidebar {
      position: fixed; bottom: 22px; right: 22px; z-index: 200;
      width: 50px; height: 50px; border-radius: 50%;
      background: linear-gradient(135deg, var(--saffron), var(--rose));
      border: none; color: #fff; font-size: 22px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(244,98,15,0.4);
      display: flex; align-items: center; justify-content: center;
    }
  }
  @media (min-width: 681px) { .toggle-sidebar { display: none; } }
</style>
</head>
<body>

<canvas id="sparkle-canvas"></canvas>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="label">♬ Songbook</div>
    <h1>March 29<br/>Lyrics</h1>
    <div class="count">15 Songs</div>
  </div>
  <div class="sidebar-search">
    <input type="text" id="search-input" placeholder="🔍  Search songs…" oninput="filterSongs(this.value)"/>
  </div>
  <ul class="song-nav" id="song-nav"></ul>
  <div class="no-results" id="no-results">No songs found.</div>
</aside>

<main class="main">
  <div class="hero">
    <div class="eyebrow">✦ Songbook Collection ✦</div>
    <h2>March 29<br/><span>Lyrics</span></h2>
    <p>Classic Bollywood songs, stage performance lyrics, and timeless Hindi melodies — all in one vibrant place.</p>
    <div class="meta">
      <div class="meta-pill"><span class="v">15</span><span class="k">Songs</span></div>
      <div class="meta-pill"><span class="v" id="edited-count">0</span><span class="k">Edited</span></div>
    </div>
  </div>
  <div class="songs-container" id="songs-container"></div>
</main>

<button class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

<script>
// ── Sparkle Canvas ──
(function(){
  const canvas = document.getElementById('sparkle-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, sparks = [];
  const COLORS = ['#f4620f','#f7c31e','#e8185a','#0ea5a0','#ff8c3a','#ff4d80','#ffe168','#9b59b6'];

  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function createSpark(){
    return {
      x: Math.random() * (window.innerWidth || 1200),
      y: Math.random() * (window.innerHeight || 800),
      r: Math.random() * 2.4 + 0.6,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: Math.random(),
      da: (Math.random() * 0.012 + 0.003) * (Math.random() < 0.5 ? 1 : -1),
      vy: -(Math.random() * 0.28 + 0.04),
      vx: (Math.random() - 0.5) * 0.18
    };
  }

  function init(){
    resize();
    sparks = Array.from({ length: 150 }, createSpark);
    window.addEventListener('resize', resize);
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    sparks.forEach(s => {
      s.alpha += s.da;
      if(s.alpha <= 0 || s.alpha >= 1) s.da *= -1;
      s.x += s.vx; s.y += s.vy;
      if(s.y < -10){ s.y = H + 10; s.x = Math.random() * W; }

      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, s.alpha));
      ctx.fillStyle = s.color;
      // 4-pointed star
      const r = s.r, ir = r * 0.38;
      ctx.beginPath();
      for(let i = 0; i < 8; i++){
        const angle = (i * Math.PI) / 4 - Math.PI / 8;
        const dist  = i % 2 === 0 ? r : ir;
        i === 0
          ? ctx.moveTo(s.x + dist * Math.cos(angle), s.y + dist * Math.sin(angle))
          : ctx.lineTo(s.x + dist * Math.cos(angle), s.y + dist * Math.sin(angle));
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }

  init(); draw();
})();

// ── SONGS ──
const SONGS = [

  { id:'song-2', title:'Yaari Hai', film:'CLAPS', lyrics:`Gar khuda mujhase kahe kuchh maang ai bande mere\nMain ye maangu mahafilon ke daur yun chalate rahen\nHamapyaala, hamaniwaala, hamasafr, hamaraaz ho\nTa kyaamat jo chiraagon ki tarah jalate rahen\n\nYaari hai imaan mera yaar meri zindagi\nPyaar ho bandon se ye sabase badi hai bndagi\n\nSaaz-e-dil chhedo jahaan men, pyaar ki gunje sada\nJin dilon men pyaar hai unape bahaaren hon fida\nPyaar leke nur aya, pyaar leke saadagi\n\nJaan bhi jaae agar yaari men yaaron gam nahin\nApane hote yaar ho gamagin matalab ham nahin\nHam jahaan hain us jagah jhumegi naachegi khushi\n\nGul-e-gulajaar kyon bezaar nazar ata hai\nChashm-e-bad ka shikaar yaar nazar ata hai\nChhupa n hamase, jra haal-e-dil suna de tu\nTeri hnsi ki qimat kya hai, ye bata de tu\n\nKahe to asamaan se chaand taaren le aun\nHasin jawaan aur dilakash najaare le aun\nTera mamanun hun tune nibhaaya yaaraana\nTeri hnsi hai aj sab se bada nazaraana\nYaar ke hnsate hi, mahafil pe jawaani a gi` },

// ── Local Storage ──
const LS_KEY = 'lyrics_edits_march29';
function loadEdits(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch{ return {}; } }
function saveEdit(id,text){ const e=loadEdits(); e[id]=text; localStorage.setItem(LS_KEY,JSON.stringify(e)); updateCount(); }
function removeEdit(id){ const e=loadEdits(); delete e[id]; localStorage.setItem(LS_KEY,JSON.stringify(e)); updateCount(); }
function updateCount(){ document.getElementById('edited-count').textContent=Object.keys(loadEdits()).length; }

// ── Render ──
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function formatLyrics(text){
  return text.split('\n').map(line=>{
    const t=line.trim();
    if(t.startsWith('[NOTE:') || t.startsWith('[NOTE '))
      return `<span class="note">${escapeHtml(t.slice(1,-1))}</span>`;
    if(t.startsWith('[') && t.endsWith(']') && t.length<=120)
      return t.length<=35
        ? `<span class="marker">${escapeHtml(t.slice(1,-1))}</span>`
        : `<span class="translation">${escapeHtml(t.slice(1,-1))}</span>`;
    if(t.startsWith('────') || t.startsWith('──── '))
      return `<hr class="divider"/>`;
    if(t==='') return '';
    return escapeHtml(line);
  }).join('\n');
}

  const edits=loadEdits();
  const nav=document.getElementById('song-nav');
  const container=document.getElementById('songs-container');

  SONGS.forEach((song,i)=>{
    const cur=edits[song.id]||song.lyrics;
    const isEdited=!!edits[song.id];

    const li=document.createElement('li');
    li.dataset.songId=song.id;
    li.innerHTML=`<a href="#${song.id}">
      <span class="num">${String(i+1).padStart(2,'0')}</span>
      <span class="title-wrap">
        <span class="nav-title">${song.title}</span>
        ${song.film?`<span class="nav-film">${song.film}</span>`:''}
      </span>
    </a>`;
    nav.appendChild(li);

    const card=document.createElement('article');
    card.className='song-card'; card.id=song.id;
    card.innerHTML=`
      <div class="card-accent"></div>
      <div class="song-card-header">
        <div class="song-card-header-left">
          <span class="song-number">${String(i+1).padStart(2,'0')}</span>
          <div class="song-title-block">
            ${song.film?`<div class="film-tag">♬ ${song.film}</div>`:''}
            <h2>${song.title}</h2>
            <span class="edited-badge ${isEdited?'visible':''}" id="badge-${song.id}">✎ Edited</span>
          </div>
        </div>
        <div class="song-actions">
          <button class="btn btn-edit" onclick="startEdit('${song.id}')">✎ Edit</button>
          <button class="btn btn-save" onclick="saveEditBtn('${song.id}')">✓ Save</button>
          <button class="btn btn-cancel" onclick="cancelEdit('${song.id}')">✕ Cancel</button>
          <button class="btn btn-reset" onclick="resetLyrics('${song.id}')">↺ Reset</button>
        </div>
      </div>
      <div class="song-lyrics" id="lyrics-${song.id}">${formatLyrics(cur)}</div>
      <textarea class="song-edit-area" id="edit-${song.id}" spellcheck="true">${cur}</textarea>
    `;
    container.appendChild(card);
  });

  updateCount();
  initScrollSpy();
}

function startEdit(id){
  const edits=loadEdits(); const song=SONGS.find(s=>s.id===id);
  document.getElementById('edit-'+id).value=edits[id]||song.lyrics;
  document.getElementById(id).classList.add('editing');
  document.getElementById('edit-'+id).focus();
}
function saveEditBtn(id){
  const newText=document.getElementById('edit-'+id).value;
  const song=SONGS.find(s=>s.id===id);
  document.getElementById('lyrics-'+id).innerHTML=formatLyrics(newText);
  if(newText.trim()===song.lyrics.trim()){
    removeEdit(id); document.getElementById('badge-'+id).classList.remove('visible');
  } else {
    saveEdit(id,newText); document.getElementById('badge-'+id).classList.add('visible');
  }
  document.getElementById(id).classList.remove('editing');
}
function cancelEdit(id){ document.getElementById(id).classList.remove('editing'); }
function resetLyrics(id){
  if(!confirm('Reset to original lyrics?')) return;
  const song=SONGS.find(s=>s.id===id);
  document.getElementById('edit-'+id).value=song.lyrics;
  document.getElementById('lyrics-'+id).innerHTML=formatLyrics(song.lyrics);
  removeEdit(id); document.getElementById('badge-'+id).classList.remove('visible');
  document.getElementById(id).classList.remove('editing');
}
function filterSongs(q){
  const query=q.toLowerCase().trim();
  const navItems=document.querySelectorAll('#song-nav li');
  const cards=document.querySelectorAll('.song-card');
  let found=0;
  SONGS.forEach((song,i)=>{
    const match=!query||song.title.toLowerCase().includes(query)||(song.film&&song.film.toLowerCase().includes(query));
    navItems[i].style.display=match?'':'none';
    cards[i].style.display=match?'':'none';
    if(match) found++;
  });
  document.getElementById('no-results').style.display=found===0?'block':'none';
}
function initScrollSpy(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        document.querySelectorAll('.song-nav li a').forEach(a=>a.classList.remove('active'));
        const link=document.querySelector(`.song-nav li a[href="#${e.target.id}"]`);
        if(link){ link.classList.add('active'); link.scrollIntoView({block:'nearest'}); }
      }
    });
  },{threshold:0.2});
  document.querySelectorAll('.song-card').forEach(c=>obs.observe(c));
}

buildPage();
</script>
</body>
</html>
